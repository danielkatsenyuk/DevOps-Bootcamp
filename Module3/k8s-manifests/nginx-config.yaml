apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nginx
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      upstream python_app {
        # הכתובת הפנימית של הפייתון בקוברנטיס
        server application-service.application.svc.cluster.local:5000;
      }

      server {
        listen 80;

        location / {
          auth_request /auth;
          proxy_pass http://python_app;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header Authorization $http_authorization;
        }
        
        location /token {
          proxy_pass http://python_app;
        }

        location = /auth {
          internal;
          proxy_pass http://python_app/validate_token;
          proxy_pass_request_body off;
          proxy_set_header Content-Length "";
          proxy_set_header X-Original-URI $request_uri;
          proxy_method GET;
        }
      }
    }