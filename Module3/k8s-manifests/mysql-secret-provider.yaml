apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mysql-parameter-provider
  namespace: mysql
spec:
  provider: aws
  secretObjects:
  - secretName: mysql-secret
    type: Opaque
    data:
    - objectName: MYSQL_ROOT_PASSWORD
      key: password
    - objectName: MYSQL_DATABASE
      key: database
  parameters:
    objects: |
      - objectName: "/dev/myapp/mysql/password"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_ROOT_PASSWORD"
      - objectName: "/dev/myapp/mysql/database"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_DATABASE"