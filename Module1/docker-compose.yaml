version: '3.8'
services:

  mysql-db:
    build: ./mysql-db
    container_name: mysql-db
    restart: unless-stopped
    env_file:
      - ./mysql-db/.env
    networks:
      - back-net
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  python-app:
    build: ./python-app
    container_name: python-container
    restart: unless-stopped
    depends_on:
      mysql-db:
        condition: service_healthy
    env_file:
      - ./mysql-db/.env        # reuses the same credentials file
    environment:
      - MYSQL_HOST=mysql-db    # override host to match the container name
    volumes:
      - ./logs:/app/logs
      - ./tokens:/app/tokens
    networks:
      - back-net
      - front-net

  nginx-proxy:
    build: ./nginx-proxy
    container_name: nginx-proxy
    ports:
      - "8080:80"
    depends_on:
      - python-app
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tokens:/etc/nginx/tokens:ro
    networks:
      - front-net

networks:
  front-net:
    driver: bridge
  back-net:
    driver: bridge

volumes:
  db_data:

