version: '3.8'
services:

  mysql-db:
    build: ./mysql-db
    container_name: mysql-db
    restart: unless-stopped
    env_file:
      - ./mysql-db/.env
    networks:
      - back-net
    volumes:
      - db_data:/var/lib/mysql

  python-app:
    build: ./python-app
    container_name: python-container
    restart: unless-stopped
    depends_on:
      - mysql-db
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=app_db
    volumes:
      - ./logs:/app/logs
      - ./tokens:/app/tokens
    networks:
      - back-net
      - front-net

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80"
    depends_on:
      - python-app
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tokens:/etc/nginx/tokens:ro
    networks:
      - front-net

networks:
  front-net:
    driver: bridge
  back-net:
    driver: bridge

volumes:
  db_data:
