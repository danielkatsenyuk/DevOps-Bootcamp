replicaCount: 1

image:
  repository: 960341592570.dkr.ecr.us-east-1.amazonaws.com/task1-dev-us-east-1-daniel-katsenyuk-mysql-repo
  tag: 1.0.0

service:
  port: 3306

serviceAccount:
  name: "mysql-sa"
  roleArn: "arn:aws:iam::960341592570:role/task1-dev-us-east-1-daniel-katsenyuk-mysql-role"

csi:
  secretProviderClassName: "mysql-parameter-provider"
  parameters:
    objects: |
      - objectName: "/dev/myapp/mysql/password"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_ROOT_PASSWORD"
      - objectName: "/dev/myapp/mysql/database"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_DATABASE"

storage:
  size: 5Gi
  storageClassName: efs-sc
  fileSystemId: fs-0b9ebcb800eec5bc9