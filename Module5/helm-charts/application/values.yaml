replicaCount: 1

image:
  repository: 960341592570.dkr.ecr.us-east-1.amazonaws.com/task1-dev-us-east-1-daniel-katsenyuk-application-repo
  tag: "1.0.0"

service:
  port: 5000

serviceAccount:
  name: "application-sa"
  roleArn: "arn:aws:iam::960341592570:role/task1-dev-us-east-1-daniel-katsenyuk-application-role"

env:
  mysqlHost: "mysql-service.mysql.svc.cluster.local"
  mysqlUser: "root"

csi:
  secretProviderClassName: "application-parameter-provider"
  parameters:
    objects: |
      - objectName: "/dev/myapp/mysql/host"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_HOST"
      - objectName: "/dev/myapp/mysql/user"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_USER"
      - objectName: "/dev/myapp/mysql/password"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_PASSWORD"
      - objectName: "/dev/myapp/mysql/database"
        objectType: "ssmparameter"
        objectAlias: "MYSQL_DATABASE"
      - objectName: "task1-dev-us-east-1-daniel-katsenyuk-generated-token"
        objectType: "secretsmanager"
        objectAlias: "APP_TOKEN"