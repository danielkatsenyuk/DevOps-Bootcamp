name: Deploy Infrastructure Tools

on:
  workflow_dispatch:
    inputs:
      role_arn:
        description: 'IAM Role ARN to assume'
        required: true
        default: 'arn:aws:iam::960341592570:role/github-actions-role'
      cluster_name:
        description: 'EKS Cluster Name'
        required: true
        default: 'task1-dev-us-east-1-daniel-katsenyuk-eks' # וודא שזה השם הנכון של הקלאסטר שלך

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.role_arn }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update KubeConfig
        run: |
          aws eks update-kubeconfig --name ${{ github.event.inputs.cluster_name }} --region us-east-1

      - name: Deploy ArgoCD Applications
        run: |
          kubectl apply -f Module6/infrastructure-tools/apps.yaml
