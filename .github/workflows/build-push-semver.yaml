name: Build and Push SemVer

on:
  workflow_dispatch:
    inputs:
      role_arn:
        description: 'IAM Role ARN to assume'
        required: true
        default: 'arn:aws:iam::960341592570:role/github-actions-role'
      bump_type:
        description: 'SemVer bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  build-push-tag:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write # חובה כדי ליצור Tag ב-Git
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required to calculate version from tags

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.role_arn }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump_type }}

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: task1-dev-us-east-1-daniel-katsenyuk-application-repo
          IMAGE_TAG: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./Module1/python-app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Pushed image with tag: $IMAGE_TAG"

      - name: Update Helm Chart values.yaml
        run: |
          sed -i "s/tag: .*/tag: ${{ steps.tag_version.outputs.new_tag }}/g" Module5/helm-charts/application/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add Module5/helm-charts/application/values.yaml
          git commit -m "chore: update image tag to ${{ steps.tag_version.outputs.new_tag }} [skip ci]"
          git push
