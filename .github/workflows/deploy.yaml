name: Build and Deploy to EKS

on:
  push:
    paths:
      - 'Module1/python-app/**'
  workflow_dispatch:
    inputs:
      role_arn:
        description: 'IAM Role ARN to assume'
        required: true
        default: 'arn:aws:iam::960341592570:role/github-actions-role'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC
      contents: write   # Required to commit Helm values update
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.role_arn || 'arn:aws:iam::960341592570:role/github-actions-role' }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: task1-dev-us-east-1-daniel-katsenyuk-application-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./Module1/python-app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Helm Chart values.yaml
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" Module5/helm-charts/application/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add Module5/helm-charts/application/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push

