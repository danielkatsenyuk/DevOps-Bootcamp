name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      role_arn:
        description: 'IAM Role ARN to assume'
        required: true
        default: 'arn:aws:iam::960341592570:role/github-actions-role'
      module:
        description: 'Terraform module to plan'
        required: true
        type: choice
        options:
          - Module2
          - Module3
          - Module4
          - Module5
          - Module6

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.role_arn }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug Secret (Check if set)
        env:
          DEBUG_SECRET: ${{ secrets.ARGOCD_GITHUB_CLIENT_SECRET }}
        run: |
          if [ -z "$DEBUG_SECRET" ]; then
            echo "::error::GITHUB SECRET 'ARGOCD_GITHUB_CLIENT_SECRET' IS NOT FOUND! Check your GitHub Settings."
            exit 1
          else
            echo "SUCCESS: GitHub Secret is found and has a length of ${#DEBUG_SECRET} characters."
          fi

      - name: Terraform Init & Plan
        env:
          TF_VAR_argocd_github_client_secret: ${{ secrets.ARGOCD_GITHUB_CLIENT_SECRET }}
        run: |
          cd "${{ github.event.inputs.module }}"
          if [ -d "terraform" ]; then cd terraform; fi
          terraform init -input=false
          terraform plan -input=false


