apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/danielkatsenyuk/DevOps-Bootcamp.git'
    targetRevision: HEAD
    path: Module5/helm-charts/mysql
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mysql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
