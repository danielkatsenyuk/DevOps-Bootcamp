apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"] # Use Spot for cost savings as per bootcamp pattern
        - key: karpenter.sh/instance-category
          operator: In
          values: ["t"] # Stick to t3/t3a families
      nodeClassRef:
        name: default
  limits:
    cpu: 10
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: KarpenterNodeRole # This role must exist in IAM
  subnetSelectorTerms:
    - tags:
        Name: "task1-dev-us-east-1-daniel-katsenyuk-private-subnet-*"
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/task1-dev-us-east-1-daniel-katsenyuk-cluster: "*"
