apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.karpenter.sh
    chart: karpenter
    targetRevision: 0.37.0 # Use a stable version
    helm:
      values: |
        settings:
          clusterName: task1-dev-us-east-1-daniel-katsenyuk-cluster
          interruptionQueue: task1-dev-us-east-1-daniel-katsenyuk-cluster-karpenter
        controller:
          roleArn: arn:aws:iam::960341592570:role/KarpenterControllerRole # Assumed role name based on standard patterns
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
