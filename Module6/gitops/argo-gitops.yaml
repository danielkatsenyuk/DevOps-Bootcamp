apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootcamp-applications
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/danielkatsenyuk/DevOps-Bootcamp.git
      revision: HEAD
      # This will find every folder in Module5/helm-charts
      directories:
      - path: Module5/helm-charts/*
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/danielkatsenyuk/DevOps-Bootcamp.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootcamp-operators
  namespace: argocd
spec:
  generators:
  - list:
      elements:
        - name: ingress-nginx
          namespace: nginx
          repoURL: https://kubernetes.github.io/ingress-nginx
          chart: ingress-nginx
          version: 4.10.1
          valuesFile: https://raw.githubusercontent.com/danielkatsenyuk/DevOps-Bootcamp/main/Module5/helm-charts/ingress-nginx-values.yaml
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{version}}'
        helm:
          valueFiles:
          - '{{valuesFile}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
