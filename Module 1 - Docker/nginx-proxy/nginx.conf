events {}

http {
    upstream python_app {
        server python-container:5000;
    }

    server {
        listen 80;

        location / {
            auth_request /auth;

            proxy_pass http://python_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Forward the auth header to the app (optional, but good if app needs it)
            proxy_set_header Authorization $http_authorization;
        }
        
        location /token {
            proxy_pass http://python_app;
        }

        location = /auth {
            internal;
            proxy_pass http://python_app/validate_token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_method GET;
        }
    }
}